version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
  settings:
    revive:
      rules:
        - name: exported
          disabled: true   # 项目内部包暂时不强制 doc comment

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
